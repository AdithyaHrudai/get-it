spring.application.name=snip

# Skip JMX setup we don't use — small startup/memory saving on free tiers.
# (Note: do NOT enable spring.main.lazy-initialization — it breaks the static
#  welcome page so "/" returns 404, which also fails the platform health check.)
spring.jmx.enabled=false
# Binds to the platform-assigned port in the cloud (Render/Railway/Fly set $PORT),
# and falls back to 8080 for local runs. Listen on all interfaces so the host's
# proxy can reach it.
server.port=${PORT:8080}
server.address=0.0.0.0

# ---------------------------------------------------------------------------
# Default database: H2 (file-based, so your links survive a restart).
# Switch to MySQL with:  --spring.profiles.active=mysql
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/getit
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console is disabled by default: it must NOT be publicly reachable on a
# deployed app. Enable it locally only when you need it, e.g.:
#   ./mvnw spring-boot:run -Dspring-boot.run.arguments=--spring.h2.console.enabled=true
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Let Hibernate create/update the schema from the @Entity classes.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Honour X-Forwarded-* headers from the hosting proxy (Render/Railway terminate
# TLS in front of the app), so generated links use the real https host.
server.forward-headers-strategy=framework

# Keep the memory footprint small on low-RAM hosts (free tiers ~512 MB): a tiny
# shortener doesn't need Tomcat's default 200-thread pool, and each thread
# reserves stack memory. 20 threads is plenty for demo traffic.
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=2

# ---------------------------------------------------------------------------
# App settings (bound to AppProperties).
# base-url is blank => short links are auto-detected from the request host,
# so they are correct on localhost AND on your deployed URL with no changes.
# Set it (or the APP_BASE_URL env var) only to pin a fixed/vanity domain.
# ---------------------------------------------------------------------------
app.base-url=${APP_BASE_URL:}
app.domain=snip
# Length of the random Base62 code. 5 chars => ~916 million combinations, so
# links stay short with negligible collision risk. Drop to 4 for even shorter.
app.short-code-length=5
