spring.application.name=get.it
# Binds to the platform-assigned port in the cloud (Render/Railway/Fly set $PORT),
# and falls back to 8080 for local runs.
server.port=${PORT:8080}

# ---------------------------------------------------------------------------
# Default database: H2 (file-based, so your links survive a restart).
# Switch to MySQL with:  --spring.profiles.active=mysql
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/getit;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Browse the data at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Let Hibernate create/update the schema from the @Entity classes.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ---------------------------------------------------------------------------
# App settings (bound to AppProperties). Set base-url to your real domain in
# production, e.g. https://get.it
# ---------------------------------------------------------------------------
app.base-url=http://localhost:8080
app.domain=get.it
app.short-code-length=6
