# ---------------------------------------------------------------------------
# MySQL profile.  Activate with:  mvn spring-boot:run -Dspring-boot.run.profiles=mysql
# or:  java -jar get-it.jar --spring.profiles.active=mysql
#
# Create the database first (or rely on createDatabaseIfNotExist=true below):
#   CREATE DATABASE getit;
# Override credentials with env vars MYSQL_USER / MYSQL_PASSWORD if you like.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/getit?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
